plugins {
    id 'com.android.application'
}

android {
    namespace 'com.btcar.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.btcar.app"
        minSdk 21
        targetSdk 30
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.4.2'
}
